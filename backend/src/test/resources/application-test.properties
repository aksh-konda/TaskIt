spring.datasource.url=jdbc:h2:mem:taskit;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

taskit.jwt.secret=test-secret-test-secret-test-secret-test-secret
taskit.jwt.access-token-minutes=15
taskit.jwt.refresh-token-days=7
taskit.cors.allowed-origin=http://localhost:5173
