spring.application.name=taskit

spring.datasource.url=jdbc:postgresql://localhost:5432/taskit
spring.datasource.username=taskit
spring.datasource.password=taskit

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:google-genai}
spring.ai.google.genai.api-key=${SPRING_AI_GOOGLE_GENAI_API_KEY:}
spring.ai.google.genai.chat.options.model=${SPRING_AI_GOOGLE_GENAI_CHAT_MODEL:gemini-3-flash-preview}
spring.ai.google.genai.chat.options.temperature=${SPRING_AI_GOOGLE_GENAI_CHAT_TEMPERATURE:0.2}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}