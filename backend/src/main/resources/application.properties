spring.application.name=taskit

spring.datasource.url=jdbc:postgresql://localhost:5432/taskit
spring.datasource.username=taskit
spring.datasource.password=taskit

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_CHAT_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=${SPRING_AI_OPENAI_CHAT_TEMPERATURE:0.2}

spring.profiles.active=dev