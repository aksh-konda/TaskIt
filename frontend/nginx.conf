server {
    # Listen for HTTP traffic on port 80.
    listen 80;

    # ---------------------------------------------------------------------------
    # React SPA — catch-all route
    # Serves the compiled React application from the dist/ folder.
    # 'try_files' attempts to match the request URI to a real file first,
    # then a directory, and falls back to index.html. This is required so that
    # client-side routes (e.g. /tasks/123) work on page refresh instead of
    # returning a 404 from nginx.
    # ---------------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------------------
    # API proxy — forward auth and task requests to the Spring Boot backend.
    # 'backend' resolves to the backend container via Docker's internal DNS.
    # This avoids CORS issues by keeping all traffic on the same origin (port 80)
    # and letting nginx forward API calls internally to port 8080.
    # ---------------------------------------------------------------------------
    location /auth {
        proxy_pass http://backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ai {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ai-logs {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /daily-logs {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /habits {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /memory {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /sessions {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /tasks {
        proxy_pass http://backend:8080;

        # Use HTTP/1.1 for keep-alive connection support.
        proxy_http_version 1.1;

        # Pass the original Host header to the backend.
        proxy_set_header Host $host;

        # Forward the real client IP so the backend can log it correctly.
        proxy_set_header X-Real-IP $remote_addr;

        # Append client IP to the X-Forwarded-For chain for proxy chains.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
