services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskit
      POSTGRES_USER: taskit
      POSTGRES_PASSWORD: taskit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskit
      SPRING_DATASOURCE_USERNAME: taskit
      SPRING_DATASOURCE_PASSWORD: taskit
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
